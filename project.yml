name: PhotoEditor
options:
  bundleIdPrefix: com.cels000
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_STRICT_CONCURRENCY: minimal
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  PhotoEditor:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PhotoEditor
        excludes:
          - "Info.plist"
          - "**/*.md"
          - "Resources/LUTs"
          - "Resources/LUTs/**"
        type: group
      # Folder reference (NOT group) so the LUTs/ directory is preserved as
      # a real subfolder in the .app bundle. FilterLibrary.swift resolves
      # `bundle.url(forResource: "LUTs", withExtension: nil)` to enumerate
      # .cube files at runtime — that requires the folder to exist as a
      # bundled directory, which `type: group` would flatten.
      - path: PhotoEditor/Resources/LUTs
        type: folder
        buildPhase: resources
    # Deliberately NO `info:` block — XcodeGen's info directive *generates* the
    # Info.plist at the specified path, overwriting our hand-crafted file and
    # stripping privacy keys (NSPhotoLibraryUsageDescription, etc.). Causes a
    # TCC privacy-violation crash on first Photos request. INFOPLIST_FILE
    # below tells xcodebuild where to find our checked-in file directly.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cels000.PhotoEditor
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: PhotoEditor/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
    # Apple frameworks autolink under Swift; no explicit dependencies needed.
    # Frameworks used: SwiftUI, UIKit, CoreImage, CoreImage.CIFilterBuiltins,
    # Photos, PhotosUI, ImageIO, SwiftData, Observation, UniformTypeIdentifiers, Metal.

  PhotoEditorTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PhotoEditorTests
        excludes:
          - "**/*.md"
        type: group
        optional: true
    dependencies:
      - target: PhotoEditor
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cels000.PhotoEditorTests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/PhotoEditor.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/PhotoEditor

schemes:
  PhotoEditor:
    build:
      targets:
        PhotoEditor: all
        PhotoEditorTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PhotoEditorTests
    archive:
      config: Release
    profile:
      config: Release
    analyze:
      config: Debug
